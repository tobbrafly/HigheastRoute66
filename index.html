<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Route 66">
  <title>Route 66 · High East</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    /* Font size modes — tiles + header scale together */
    body.fs-small  { --fs-num:16px; --fs-grade:10px; --fs-logo:14px; --fs-sub:9px;  --fs-pill:9px;  --fs-stat:10px; }
    body.fs-medium { --fs-num:20px; --fs-grade:12px; --fs-logo:16px; --fs-sub:10px; --fs-pill:10px; --fs-stat:11px; }
    body.fs-large  { --fs-num:30px; --fs-grade:16px; --fs-logo:20px; --fs-sub:12px; --fs-pill:12px; --fs-stat:13px; }
    body { --fs-num:20px; --fs-grade:12px; --fs-logo:16px; --fs-sub:10px; --fs-pill:10px; --fs-stat:11px; }
    :root {
      --bg:#0c0c0c; --surf:#181818; --card:#1e1e1e;
      --done:#192419; --open:#1c1c0e; --unset:#141414;
      --acc:#d4f57a; --green:#4ade80; --orange:#ff6b35;
      --txt:#f0f0e8; --muted:#999; --border:#383838;
    }
    body { background:var(--bg); color:var(--txt); font-family:'DM Mono','Courier New',monospace; max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:40px; }

    /* ── Header ── */
    #header { background:var(--surf); padding:16px 14px 10px; position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border); }
    .h-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .logo { font-size:var(--fs-logo); font-weight:700; }
    .sub  { font-size:var(--fs-sub); color:var(--muted); margin-top:2px; }
    .h-right { display:flex; align-items:center; gap:8px; }
    .badge { background:var(--orange); color:#fff; padding:4px 12px; border-radius:99px; font-size:13px; font-weight:900; }
    .gear-btn { background:transparent; border:none; color:var(--muted); font-size:18px; cursor:pointer; line-height:1; padding:0; }
    .save-ind { font-size:11px; color:var(--acc); opacity:0; transition:opacity .3s; }
    .save-ind.show { opacity:.8; }

    /* Progress */
    .track { height:5px; background:var(--border); border-radius:99px; overflow:hidden; position:relative; margin-bottom:5px; }
    .seg { position:absolute; top:0; left:0; height:100%; border-radius:99px; transition:width .4s; }
    .seg-a { background:#252510; }
    .seg-d { background:linear-gradient(90deg,#d4f57a,#4ade80); }
    .stats { display:flex; justify-content:space-between; font-size:var(--fs-stat); margin-bottom:10px; }
    .hi { color:var(--acc); font-weight:700; }
    .mu { color:var(--muted); }

    /* Pills */
    .pills { display:flex; gap:5px; }
    .pill { flex:1; padding:5px 2px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:var(--fs-pill); cursor:pointer; font-family:inherit; font-weight:600; }
    .pill.on { background:var(--acc); color:var(--bg); border-color:var(--acc); }

    /* ── Grid ── */
    #grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; padding:10px; }
    .tile { position:relative; aspect-ratio:1; border-radius:11px; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-family:inherit; transition:transform .1s; }
    .tile:active { transform:scale(.94); }
    .tile.done  { background:var(--done); }
    .tile.open  { background:var(--open); }
    .tile.unset { background:var(--unset); opacity:.65; }
    .tile.colored { opacity:1; }
    .t-num   { font-size:var(--fs-num); font-weight:700; color:var(--txt); line-height:1; text-shadow:0 1px 4px rgba(0,0,0,.9); }
    .t-grade { font-size:var(--fs-grade); line-height:1; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.9); }
    .tile.done  .t-grade { color:#fff; }
    .tile.open  .t-grade { color:#fff; }
    .tile.unset .t-grade { color:#555; }
    .t-check { position:absolute; top:5px; right:7px; font-size:11px; color:#fff; font-weight:900; text-shadow:0 1px 3px rgba(0,0,0,.8); }
    .t-tries { position:absolute; bottom:4px; right:6px; font-size:9px; color:var(--muted); }
    .t-loc   { position:absolute; bottom:3px; left:5px; font-size:9px; line-height:1; }

    /* ── Overlay + Sheet ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.82); display:flex; align-items:flex-end; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
    .overlay.show { opacity:1; pointer-events:all; }
    .sheet { width:100%; max-width:480px; margin:0 auto; background:var(--surf); border-radius:18px 18px 0 0; padding:10px 18px 40px; border:1px solid var(--border); border-bottom:none; max-height:93vh; overflow-y:auto; transform:translateY(100%); transition:transform .25s ease; }
    .overlay.show .sheet { transform:translateY(0); }
    .handle { width:36px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 14px; }
    .s-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .s-title { font-size:20px; font-weight:700; }
    .s-state { font-size:12px; font-weight:600; }
    .x-btn { background:var(--border); border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; color:var(--muted); font-size:13px; font-family:inherit; flex-shrink:0; }
    .lbl { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
    .mt { margin-top:12px; }

    /* Grade */
    .grade-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .g-btn { padding:7px 9px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--txt); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
    .g-btn.on { background:var(--acc); color:var(--bg); border-color:var(--acc); }
    .g-input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--txt); font-size:13px; font-family:inherit; }

    /* Tabs */
    .tabs { display:flex; gap:6px; margin:16px 0 14px; }
    .tab { flex:1; padding:8px 4px; border-radius:9px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
    .tab.on { background:var(--card); color:var(--txt); border-color:#3a3a3a; }

    /* Inputs */
    .date-inp { width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--txt); font-size:13px; font-family:inherit; color-scheme:dark; }
    .att-wrap { display:flex; gap:7px; }
    .a-btn { flex:1; padding:9px 0; border-radius:9px; border:1px solid var(--border); background:var(--card); color:var(--txt); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .a-btn.on { background:var(--acc); color:var(--bg); border-color:var(--acc); }
    textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:9px; color:var(--txt); padding:10px; font-size:13px; font-family:inherit; resize:none; }

    /* Buttons */
    .actions { display:flex; gap:9px; margin-top:16px; margin-bottom:8px; }
    .btn-p { flex:1; padding:13px 0; border-radius:12px; border:none; background:linear-gradient(135deg,#d4f57a,#4ade80); color:var(--bg); font-size:14px; font-weight:900; cursor:pointer; font-family:inherit; }
    .btn-s { flex:1; padding:13px 0; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--txt); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .danger-row { display:flex; gap:9px; }
    .d-btn { flex:1; padding:9px 0; border-radius:10px; border:1px solid #3a1515; background:transparent; color:#f87171; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }

    /* Try list */
    .try-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .try-item { background:var(--card); border-radius:10px; padding:10px 36px 10px 12px; position:relative; }
    .try-meta { display:flex; justify-content:space-between; margin-bottom:4px; }
    .try-dt  { font-size:11px; color:var(--muted); }
    .try-att { font-size:11px; color:var(--acc); font-weight:700; }
    .try-cmt { font-size:12px; color:#aaa; line-height:1.4; }
    .try-del { position:absolute; top:8px; right:10px; background:transparent; border:none; color:#777; font-size:13px; cursor:pointer; }

    /* Settings */
    .set-desc { font-size:12px; color:var(--muted); margin-bottom:16px; line-height:1.6; }
    .set-row  { margin-bottom:14px; }
    .set-inp  { width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--border); background:var(--card); color:var(--txt); font-size:13px; font-family:inherit; margin-top:6px; }
    .set-hint { font-size:10px; color:var(--muted); margin-top:5px; line-height:1.4; }
    .conn-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
    .dot-ok   { background:var(--green); }
    .dot-err  { background:#f87171; }
    .dot-idle { background:var(--muted); }
    .section-sep { border-top:1px solid var(--border); padding-top:16px; margin-top:20px; }

    .empty { color:#555; font-size:13px; text-align:center; padding:20px; grid-column:1/-1; }
  </style>
</head>
<body>
<header id="header"></header>
<main id="grid"></main>

<!-- Route sheet -->
<div id="ov" class="overlay" onclick="if(event.target===this)closeSheet()">
  <div id="sheet" class="sheet"></div>
</div>

<!-- Settings sheet -->
<div id="set-ov" class="overlay" onclick="if(event.target===this)closeSettings()">
  <div id="set-sheet" class="sheet"></div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const GRADES   = ["4","4+","5-","5","5+","6-","6","6+","7-","7","7+","8-","8","8+","9-"];
const ATTEMPTS = ["1","2","3","4","5","6+"];
const START    = new Date("2026-05-12T00:00:00");
const END      = new Date("2026-07-16T23:00:00");
const TOTAL_DAYS = 66;

// Route color → CSS color mapping
const COLOR_CSS = {
  "Gelb":         "#e8c800",
  "Rot":          "#dc2626",
  "Blau":         "#2563eb",
  "Grün":         "#16a34a",
  "Schwarz":      "#555555",
  "Weiß":         "#e8e8e8",
  "Orange":       "#ea580c",
  "Mint":         "#34d399",
  "Grau":         "#6b7280",
  "Lila":         "#7c3aed",
  "Schweden":     ["#e8c800", "#2563eb"],
  "Weiß-Blau":   ["#e8e8e8", "#2563eb"],
  "Schwarz-Grün": ["#555555", "#16a34a"],
  "Weiß-Rot":    ["#e8e8e8", "#dc2626"],
  "Gelb-Schwarz": ["#e8c800", "#555555"],
};

// Returns CSS background value for a route color string
function routeBg(colorStr, opacity) {
  if (!colorStr) return null;
  const val = COLOR_CSS[colorStr];
  if (!val) return null;
  if (Array.isArray(val)) {
    // two-color diagonal split
    const c1 = hexAlpha(val[0], opacity);
    const c2 = hexAlpha(val[1], opacity);
    return "linear-gradient(135deg, " + c1 + " 50%, " + c2 + " 50%)";
  }
  return hexAlpha(val, opacity);
}
function hexAlpha(hex, alpha) {
  // Convert #rrggbb + alpha 0-1 to rgba
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

// Static route data — grade + color per route, null = not yet bolted
const ROUTE_DATA = {
   1:{grade:"4",    color:"Gelb"},       2:{grade:"4+",   color:"Rot"},
   3:{grade:"4+",   color:"Blau"},       4:{grade:"5-",   color:"Gelb"},
   5:{grade:"5-",   color:"Grün"},       6:{grade:"5-",   color:"Rot"},
   7:{grade:"5",   color:"Lila"},         8:{grade:"5",    color:"Schwarz"},
   9:{grade:"5",    color:"Weiß-Blau"}, 10:{grade:"5",    color:"Gelb"},
  11:{grade:"5+",   color:"Grün"},        12:{grade:"5+",   color:"Orange"},
  13:{grade:"5+",   color:"Grün"},      14:{grade:"5+",   color:"Orange"},
  15:{grade:"6-",   color:"Schweden"},        16:{grade:"6-",   color:"Weiß"},
  17:{grade:"6-",   color:"Gelb"},      18:{grade:"6-",   color:"Blau"},
  19:{grade:"6-",   color:"Weiß-Blau"},20:{grade:"6",   color:"Schwarz"},
  21:{grade:"6",    color:"Weiß"},      22:{grade:"6",    color:"Blau"},
  23:{grade:"6",    color:"Gelb"},      24:{grade:"6",    color:"Schwarz-Grün"},
  25:{grade:null,   color:null},        26:{grade:"6+",   color:"Weiß"},
  27:{grade:"6+",   color:"Grün"},      28:{grade:"6+",   color:"Rot"},
  29:{grade:"6+",   color:"Blau"},      30:{grade:"6+",   color:"Blau"},
  31:{grade:"7-",   color:"Weiß-Blau"},32:{grade:"7-",   color:"Schwarz"},
  33:{grade:"7-",   color:"Grün"},      34:{grade:"7-",   color:"Grün"},
  35:{grade:"7-/7",   color:"Mint"},        36:{grade:"7-/7", color:"Gelb"},
  37:{grade:"7",    color:"Weiß-Rot"}, 38:{grade:"7",    color:"Gelb"},
  39:{grade:"7",    color:"Schwarz"},   40:{grade:"7",    color:"Gelb"},
  41:{grade:null,   color:null},        42:{grade:"7/7+", color:"Grau"},
  43:{grade:"7/7+", color:"Schwarz"},  44:{grade:"7/7+", color:"Blau"},
  45:{grade:"7+",   color:"Weiß-Rot"},46:{grade:"7+",   color:"Grün"},
  47:{grade:null,   color:null},        48:{grade:"7+/8-",color:"Lila"},
  49:{grade:"8-",   color:"Blau"},      50:{grade:"8-",   color:"Mint"},
  51:{grade:"8-",   color:"Schweden"}, 52:{grade:"8-",   color:"Orange"},
  53:{grade:null,   color:null},        54:{grade:"8",    color:"Orange"},
  55:{grade:"8",    color:"Weiß-Rot"}, 56:{grade:"8",    color:"Grau"},
  57:{grade:null,   color:null},        58:{grade:"8/8+", color:"Schwarz"},
  59:{grade:"8+",   color:"Gelb-Schwarz"},60:{grade:"8+", color:"Grün"},
  61:{grade:"8+",   color:"Mint"},        62:{grade:"8+/9-",color:"Rot"},
  63:{grade:"9-",   color:"Rot"},       64:{grade:null,   color:null},
  65:{grade:"9",    color:"Orange"},    66:{grade:"9+",   color:"Weiß"},
};
// Backwards-compat shim so old ROUTE_META references still work
const ROUTE_META = { grade: Object.fromEntries(Object.entries(ROUTE_DATA).map(([k,v])=>[k,v.grade]).filter(([,v])=>v)) };
// Public version — no HA sync

// Static location data — "in" | "out" (unbolted routes omitted)
const STATIC_LOCS = {
  1: "out",
  2: "in",
  3: "out",
  4: "in",
  5: "in",
  6: "out",
  7: "in",
  8: "out",
  9: "in",
  10: "in",
  11: "in",
  12: "in",
  13: "out",
  14: "out",
  15: "in",
  16: "in",
  17: "in",
  18: "out",
  19: "out",
  20: "in",
  21: "in",
  22: "in",
  23: "in",
  24: "out",
  25: "in",
  26: "in",
  27: "out",
  28: "in",
  29: "out",
  30: "in",
  31: "in",
  32: "in",
  33: "in",
  34: "out",
  35: "in",
  36: "out",
  37: "in",
  38: "out",
  39: "in",
  40: "in",
  42: "out",
  43: "in",
  44: "in",
  45: "out",
  46: "in",
  48: "in",
  49: "out",
  50: "in",
  51: "in",
  52: "in",
  54: "in",
  55: "out",
  56: "in",
  58: "out",
  59: "out",
  60: "in",
  61: "in",
  62: "out",
  63: "out",
  65: "in",
  66: "in"
};

// ── App state ─────────────────────────────────────────────────────────────────
let grades = {}, logs = {}, tries = {};
let filter = "all";
let fontSize = localStorage.getItem("r66-fs") || "large";
let locFilter = "all"; // "all" | "in" | "out" | "unknown"
let sortMode = "num";
let saving = false;
let modal  = null;

// HA config (kept in localStorage, not synced to HA)
let haToken = ""; let haStatus = { ok: null, msg: "" };
let locs = {};

// ── Helpers ───────────────────────────────────────────────────────────────────
const daysLeft = () => Math.max(0, Math.ceil((END - new Date()) / 86400000));
const state      = id => logs[id] ? "done" : (grades[id] || ROUTE_DATA[id]?.grade) ? "open" : "unset";
const routeGrade = id => grades[id] || ROUTE_DATA[id]?.grade || null;
const tryCount = id => (tries[id] || []).length;

function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("de-DE", {
    day:"2-digit", month:"2-digit", year:"2-digit", hour:"2-digit", minute:"2-digit"
  });
}
function toInput(iso) {
  const d = new Date(iso || new Date());
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
}

// ── Storage: localStorage ─────────────────────────────────────────────────────
function saveLocal() {
  try { localStorage.setItem("r66", JSON.stringify({ grades, logs, tries, locs })); } catch(e) {}
}
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem("r66") || "{}");
    grades = d.grades || {};
    logs   = d.logs   || {};
    tries  = d.tries  || {};
    locs = d.locs || {};
  } catch(e) {}
}

// ── Storage: Home Assistant REST API ──────────────────────────────────────────
function effectiveHaUrl() { return ''; }
async function haGet() { return null; }
async function haSet() {}


async function persist() {
  saving = true; showSaveInd();
  saveLocal();
  await haSet(grades, logs, tries);
  saving = false; showSaveInd();
  renderHeader(); // update HA badge after sync
}
function showSaveInd() {
  const el = document.querySelector(".save-ind");
  if (el) el.classList.toggle("show", saving);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  loadLocal();
  applyStaticLocs();
  applyStaticGrades();
  render(); // show local data immediately

  const haData = await haGet();
  if (haData) {
    grades = haData.grades;
    logs   = haData.logs;
    tries  = haData.tries;
    locs   = haData.locs || {};
    applyStaticLocs();
    applyStaticGrades(); // ensure static grades fill any gaps
    saveLocal();
    render();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  renderGrid();
}

function renderHeader() {
  const done  = Object.keys(logs).length;
  const avail = Object.keys(grades).length;
  const pct      = Math.round(done/66*100);
  const aPct     = Math.round(avail/66*100);
  const daysDone = Math.min(TOTAL_DAYS, Math.max(0, Math.floor((new Date() - START) / 86400000)));
  const timePct  = Math.round(daysDone / TOTAL_DAYS * 100);
  const timeColor = timePct < 40 ? "#4ade80" : timePct < 65 ? "#d4f57a" : timePct < 85 ? "#ffaa35" : "#ff6b35";
  const inCount  = Object.keys(locs).filter(id => locs[id]==="in").length;
  const outCount = Object.keys(locs).filter(id => locs[id]==="out").length;
  const totalT = Object.values(tries).reduce((s,a)=>s+a.length, 0);

  const pills = [
    ["all",   "Alle"],
    ["open",  `Offen (${avail-done})`],
    ["done",  `✓ (${done})`],
    ["unset", `? (${66-avail})`]
  ].map(([f,l]) => `<button class="pill${filter===f?" on":""}" onclick="setFilter('${f}')">${l}</button>`).join("");

  const sortPills = [
    ["num", "Nummer"],
    ["date_desc", "Datum ↓"],
    ["date_asc", "Datum ↑"]
  ].map(([s,l]) => `<button class="pill${sortMode===s?" on":""}" onclick="setSort('${s}')">${l}</button>`).join("");

  // (no badge in public version) to avoid nested template literal syntax errors
  const hasToken = !!haToken;
  const bColor = !hasToken ? "#999" : haStatus.ok === true ? "#4ade80" : haStatus.ok === false ? "#f87171" : "#ccc";
  const bBorder = !hasToken ? "#666" : haStatus.ok === true ? "#4ade80" : haStatus.ok === false ? "#f87171" : "#666";
  const bLabel  = !hasToken ? "HA off" : haStatus.ok === true ? "HA \u2713" : haStatus.ok === false ? "HA \u2717" : "HA ?";
  const bTitle  = esc(!hasToken ? "Kein Token gespeichert" : (haStatus.msg || "HA-Sync Status"));
  const haBadge = '<span id="ha-badge" onclick="openSettings()" title="' + bTitle + '" style="padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid ' + bBorder + ';color:' + bColor + ';background:transparent">' + bLabel + '</span>';

  document.getElementById("header").innerHTML = `
    <div class="h-top">
      <div><div class="logo">🧗 Route 66</div><div class="sub">${userName ? userName + " · " : ""}High East · Heimstetten</div></div>
      <div class="h-right">
        <span class="save-ind${saving?" show":""}">💾</span>
        <span class="badge">${done}/66</span>
        <button class="gear-btn" onclick="openSettings()">⚙️</button>
      </div>
    </div>
    <div class="track"><div class="seg" style="width:${timePct}%;background:${timeColor}"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;margin-top:2px;margin-bottom:4px">
      <span style="color:var(--muted)">${daysDone} Tage vergangen</span>
      <span style="color:${timeColor};font-weight:700">${daysLeft()} Tage übrig</span>
    </div>
    <div class="stats">
      <span><b class="hi">${done}</b><span class="mu"> geschafft</span></span>
      <span><b class="hi">${avail}</b><span class="mu"> geschraubt</span></span>
      <span><b class="hi">${totalT}</b><span class="mu"> Versuche</span></span>
    </div>
    <div class="pills">${pills}</div>
    <div class="pills" style="margin-top:5px">
      <button class="pill${locFilter==="all"?" on":""}" onclick="setLocFilter('all')">Alle</button>
      <button class="pill${locFilter==="in"?" on":""}" onclick="setLocFilter('in')">🏠 Drinnen (${inCount})</button>
      <button class="pill${locFilter==="out"?" on":""}" onclick="setLocFilter('out')">🌤 Draußen (${outCount})</button>
    </div>
    <div class="pills" style="margin-top:6px">${sortPills}</div>
  `;
}

function renderGrid() {
  let html = "";
  const ids = Array.from({ length: 66 }, (_, i) => i + 1).filter(id => {
    const s = state(id);
    if (filter === "done"  && s !== "done")  return false;
    if (filter === "open"  && s !== "open")  return false;
    if (filter === "unset" && s !== "unset") return false;
    const loc = locs[id];
    if (locFilter === "in"  && loc !== "in")  return false;
    if (locFilter === "out" && loc !== "out") return false;
    if (locFilter === "none" && loc)          return false;
    return true;
  });

  const getSortTimestamp = id => {
    const s = state(id);
    if (s === "done") return Date.parse(logs[id]?.date || 0) || 0;
    if (s === "open") {
      const list = tries[id] || [];
      if (!list.length) return 0;
      return list.reduce((maxTs, t) => {
        const ts = Date.parse(t.date || 0) || 0;
        return ts > maxTs ? ts : maxTs;
      }, 0);
    }
    return 0;
  };

  if (sortMode !== "num" && (filter === "done" || filter === "open")) {
    ids.sort((a, b) => {
      const aTs = getSortTimestamp(a);
      const bTs = getSortTimestamp(b);
      if (aTs !== bTs) return sortMode === "date_asc" ? aTs - bTs : bTs - aTs;
      return a - b;
    });
  }

  for (const id of ids) {
    const s   = state(id);
    const g   = routeGrade(id) || "?";
    const tc  = tryCount(id);
    const loc = locs[id];
    const locIcon = loc === "in" ? "🏠" : loc === "out" ? "🌤" : "";
    const rd  = ROUTE_DATA[id];
    var tileBg = "";
    var tileClass = s;
    if (rd && rd.color) {
      var op = s === "unset" ? 0.25 : s === "done" ? 0.55 : 1.0;
      var bg = routeBg(rd.color, op);
      if (bg) tileBg = ' style="background:' + bg + '"';
    }
    var doneOverlay = s === "done" && rd && rd.color ? ";box-shadow:inset 0 0 0 999px rgba(0,0,0,0.35)" : "";
    var finalBg = tileBg ? tileBg.slice(0,-1) + doneOverlay + '"' : "";
    html += '<button class="tile ' + s + '"' + finalBg + ' onclick="openSheet(' + id + ')">'
          + '<span class="t-num">' + id + '</span>'
          + '<span class="t-grade">' + esc(g) + '</span>'
          + (s === "done" ? '<span class="t-check">✓</span>' : "")
          + (tc > 0 && s !== "done" ? '<span class="t-tries">' + tc + '×</span>' : "")
          + (locIcon ? '<span class="t-loc-badge">' + locIcon + '</span>' : "")
          + '</button>';
  }

  document.getElementById("grid").innerHTML = html || `<p class="empty">Keine Routen in dieser Ansicht.</p>`;
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function setLoc(id, val) {
  if (val) locs[id] = val; else delete locs[id];
  renderSheet(); renderHeader();
  persist();
}
function setFontSize(s) {
  fontSize = s;
  localStorage.setItem("r66-fs", s);
  applyFontSize();
  renderSettings();
}
function setFilter(f) { filter = f; render(); }
function setLocFilter(f) { locFilter = f; render(); }
function setSort(s)   { sortMode = s; render(); }
function setGrade(g) { if (!modal) return; modal.grade = g; renderSheet(); }
function setAtt(a)   { if (!modal) return; modal.att  = a; renderSheet(); }
function setTryAtt(a){ if (!modal) return; modal.tAtt = a; renderSheet(); }
function setTab(t)   { if (!modal) return; modal.tab  = t; renderSheet(); }

// ── Open sheet ────────────────────────────────────────────────────────────────
function openSheet(id) {
  const s   = state(id);
  const log = logs[id] || {};
  modal = {
    id, s,
    grade: grades[id] || "",
    tab:   "send", // Default to "Geschafft" instead of "Versucht"
    // send tab
    date:  log.date     || new Date().toISOString(),
    att:   log.attempts || "1",
    cmt:   log.comment  || "",
    // try tab
    tDate: new Date().toISOString(),
    tAtt:  "1",
    tCmt:  "",
    tryList: [...(tries[id] || [])]
  };
  renderSheet();
  document.getElementById("ov").classList.add("show");
}
function closeSheet() {
  document.getElementById("ov").classList.remove("show");
  modal = null;
}

// ── Render sheet ──────────────────────────────────────────────────────────────
function renderSheet() {
  const m = modal;
  if (!m) return;

  const stateLabel = { done:"Geschafft ✓", open:"Offen", unset:"Nicht geschraubt" }[m.s];
  const stateColor = { done:"#4ade80", open:"#d4f57a", unset:"#999" }[m.s];

  // Grade picker
  const customGrade = GRADES.includes(m.grade) ? "" : m.grade;
  const gradePicker = `
    <label class="lbl">Schwierigkeit</label>
    <div class="grade-wrap">
      ${GRADES.map(g=>`<button class="g-btn${m.grade===g?" on":""}" onclick="setGrade('${g}')">${g}</button>`).join("")}
    </div>
    <input class="g-input" placeholder="Eigener Grad (z.B. 7-/7)…" value="${esc(customGrade)}"
      oninput="modal.grade=this.value">
  `;

  // Tabs (not for unset)
  let tabs = "";
  if (m.s !== "unset") {
    const tabDefs = [
      ["send", m.s==="done" ? "✓ Besteigung" : "Geschafft"],
      ["try",  "+ Versuch loggen"],
      ...(m.tryList.length>0 ? [["tries",`Versuche (${m.tryList.length})`]] : [])
    ];
    tabs = `<div class="tabs">${tabDefs.map(([t,l])=>`<button class="tab${m.tab===t?" on":""}" onclick="setTab('${t}')">${l}</button>`).join("")}</div>`;
  }

  // Tab content
  let content = "";

  if (m.s==="unset" || m.tab==="send") {
    const fields = m.s!=="unset" ? `
      <label class="lbl mt">Datum & Uhrzeit</label>
      <input type="datetime-local" class="date-inp" value="${toInput(m.date)}" onchange="modal.date=new Date(this.value).toISOString()">
      <label class="lbl mt">Versuche bis zur Begehung</label>
      <div class="att-wrap">${ATTEMPTS.map(a=>`<button class="a-btn${m.att===a?" on":""}" onclick="setAtt('${a}')">${a}</button>`).join("")}</div>
      <label class="lbl mt">Kommentar</label>
      <textarea rows="2" placeholder="Beta, Crux, Gefühl…" oninput="modal.cmt=this.value">${esc(m.cmt)}</textarea>
    ` : "";

    const actions =
      m.s==="unset" ? `<div class="actions"><button class="btn-s" onclick="doOpen()">Als offen markieren</button></div>` :
      m.s==="open"  ? `<div class="actions"><button class="btn-p" onclick="doDone()">✓ Geschafft!</button></div>` :
      `<div class="actions"><button class="btn-s" onclick="doUndo()">↩ Haken entfernen</button><button class="btn-p" onclick="doDone()">Speichern</button></div>`;

    const danger = m.s!=="unset" ? `<div class="danger-row"><button class="d-btn" onclick="doUnset()">⚠ Route als ungesetzt markieren</button></div>` : "";

    content = fields + actions + danger;
  }

  if (m.tab==="try" && m.s!=="unset") {
    content = `
      <label class="lbl">Datum & Uhrzeit</label>
      <input type="datetime-local" class="date-inp" value="${toInput(m.tDate)}" onchange="modal.tDate=new Date(this.value).toISOString()">
      <label class="lbl mt">Versuche diese Session</label>
      <div class="att-wrap">${ATTEMPTS.map(a=>`<button class="a-btn${m.tAtt===a?" on":""}" onclick="setTryAtt('${a}')">${a}</button>`).join("")}</div>
      <label class="lbl mt">Kommentar</label>
      <textarea rows="2" placeholder="Kam bis zum Crux, Fuß abgerutscht…" oninput="modal.tCmt=this.value">${esc(m.tCmt)}</textarea>
      <div class="actions"><button class="btn-p" onclick="doAddTry()">Versuch speichern</button></div>
    `;
  }

  if (m.tab==="tries" && m.s!=="unset") {
    if (!m.tryList.length) {
      content = `<p class="empty">Noch keine Versuche geloggt.</p>`;
    } else {
      const items = [...m.tryList].reverse().map((t, ri) => {
        const idx = m.tryList.length - 1 - ri;
        return `<div class="try-item">
          <div class="try-meta"><span class="try-dt">${fmtDate(t.date)}</span><span class="try-att">${t.attempts} Versuch${t.attempts!=="1"?"e":""}</span></div>
          ${t.comment ? `<div class="try-cmt">${esc(t.comment)}</div>` : ""}
          <button class="try-del" onclick="doDelTry(${idx})">✕</button>
        </div>`;
      }).join("");
      content = `<div class="try-list">${items}</div>`;
    }
  }

  document.getElementById("sheet").innerHTML = `
    <div class="handle"></div>
    <div class="s-top">
      <div><span class="s-title">Route ${m.id}</span> <span class="s-state" style="color:${stateColor}">· ${stateLabel}</span></div>
      <button class="x-btn" onclick="closeSheet()">✕</button>
    </div>
    ${gradePicker}
    <label class="lbl" style="margin-top:12px">Standort</label>
    <div style="display:flex;gap:8px;margin-bottom:4px">
      <button style="flex:1;padding:8px 0;border-radius:9px;border:1px solid ${locs[m.id]==='in'?'#d4f57a':'var(--border)'};background:${locs[m.id]==='in'?'#252510':'transparent'};color:${locs[m.id]==='in'?'#d4f57a':'var(--muted)'};font-size:13px;cursor:pointer;font-family:inherit;font-weight:700" onclick="setLoc(${m.id},'in')">🏠 Drinnen</button>
      <button style="flex:1;padding:8px 0;border-radius:9px;border:1px solid ${locs[m.id]==='out'?'#d4f57a':'var(--border)'};background:${locs[m.id]==='out'?'#252510':'transparent'};color:${locs[m.id]==='out'?'#d4f57a':'var(--muted)'};font-size:13px;cursor:pointer;font-family:inherit;font-weight:700" onclick="setLoc(${m.id},'out')">🌤 Draußen</button>
      <button style="flex:1;padding:8px 0;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit" onclick="setLoc(${m.id},'')">✕ Keine</button>
    </div>
    ${tabs}
    ${content}
  `;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function doOpen() {
  grades[modal.id] = modal.grade || "?";
  closeSheet(); render(); await persist();
}
async function doDone() {
  grades[modal.id] = modal.grade || "?";
  logs[modal.id]   = { date:new Date(modal.date).toISOString(), attempts:modal.att, comment:modal.cmt };
  closeSheet(); render(); await persist();
}
async function doUndo() {
  delete logs[modal.id];
  closeSheet(); render(); await persist();
}
async function doUnset() {
  delete grades[modal.id]; delete logs[modal.id];
  closeSheet(); render(); await persist();
}
async function doAddTry() {
  if (!tries[modal.id]) tries[modal.id] = [];
  tries[modal.id].push({ date:new Date(modal.tDate).toISOString(), attempts:modal.tAtt, comment:modal.tCmt });
  grades[modal.id] = modal.grade || grades[modal.id] || "?";
  closeSheet(); render(); await persist();
}
async function doDelTry(idx) {
  tries[modal.id].splice(idx, 1);
  modal.tryList = [...tries[modal.id]];
  renderSheet(); render(); await persist();
}

// ── Settings ──────────────────────────────────────────────────────────────────
let userName = localStorage.getItem('r66-name') || '';

function renderSettings() {
  document.getElementById("set-sheet").innerHTML = `
    <div class="handle"></div>
    <div class="s-top">
      <span class="s-title">⚙️ Einstellungen</span>
      <button class="x-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="set-row">
      <label class="lbl">Dein Name</label>
      <input class="set-inp" id="set-name" type="text" placeholder="z.B. Tobi" value="${esc(userName)}">
    </div>
    <div class="actions" style="margin-top:8px">
      <div class="set-row" style="margin-top:16px">
      <label class="lbl">Schriftgröße</label>
      <div style="display:flex;gap:8px;margin-top:6px">
        ${["small","medium","large"].map(s => "<button onclick=\"setFontSize('"+s+"')\" style=\"flex:1;padding:8px 0;border-radius:9px;border:1px solid "+(fontSize===s?"var(--acc)":"var(--border)")+";background:"+(fontSize===s?"#252510":"transparent")+";color:"+(fontSize===s?"var(--acc)":"var(--muted)")+";font-size:12px;font-weight:700;cursor:pointer;font-family:inherit\">"+(s==="small"?"Klein":s==="medium"?"Mittel":"Groß")+"</button>").join("")}
      </div>
    </div>
    <button class="btn-p" onclick="doSaveName()">Speichern</button>
    </div>
    <div class="section-sep">
      <label class="lbl">Datensicherung</label>
      <div class="actions" style="margin-top:8px">
        <button class="btn-s" onclick="doExport()">📤 Exportieren</button>
        <button class="btn-s" onclick="document.getElementById('imp').click()">📥 Importieren</button>
      </div>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="doImport(this)">
    </div>
  `;
}

function openSettings() {
  renderSettings();
  document.getElementById("set-ov").classList.add("show");
}
function closeSettings() {
  document.getElementById("set-ov").classList.remove("show");
}

function doSaveName() {
  userName = document.getElementById('set-name').value.trim();
  localStorage.setItem('r66-name', userName);
  closeSettings(); renderHeader();
}

function doExport() {
  const blob = new Blob([JSON.stringify({grades,logs,tries},null,2)], {type:"application/json"});
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob),
    download: `route66-${new Date().toISOString().slice(0,10)}.json`
  });
  a.click();
}

function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const d = JSON.parse(e.target.result);
      grades = d.grades || {}; logs = d.logs || {}; tries = d.tries || {};
      render(); await persist();
      alert("✓ Import erfolgreich!");
    } catch(err) { alert("Fehler: " + err.message); }
  };
  reader.readAsText(file);
}

// ── Merge static grades into stored data ────────────────────────────────────
function applyStaticLocs() {
  // Fill in static locations for routes not yet manually set
  for (const id in STATIC_LOCS) {
    if (!locs[id]) locs[id] = STATIC_LOCS[id];
  }
}

function applyStaticGrades() {
  for (const [id, grade] of Object.entries(ROUTE_META.grade)) {
    if (!grades[id]) grades[id] = grade;
  }
}

function applyFontSize() {
  document.body.classList.remove("fs-small","fs-medium","fs-large");
  document.body.classList.add("fs-" + fontSize);
}

// ── Start ─────────────────────────────────────────────────────────────────────
userName = localStorage.getItem('r66-name') || '';
applyFontSize();
init();
</script>
